<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biyokimya Pro | Mami Balanced Edition</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161e2d;
            --primary: #38bdf8;
            --secondary: #94a3b8;
            --accent: #f472b6;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #quiz-container {
            background: var(--card-bg);
            max-width: 650px;
            width: 100%;
            padding: 35px;
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .counter-badge {
            background: rgba(56, 189, 248, 0.15);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .progress-container {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 35px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s ease;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #fff;
        }

        .options-grid {
            display: grid;
            gap: 14px;
        }

        .option {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 1.05rem;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: scale(1.02);
        }

        .option.correct {
            background: rgba(34, 197, 94, 0.2) !important;
            border-color: var(--success) !important;
            color: #4ade80;
            font-weight: 700;
        }

        .option.wrong {
            background: rgba(239, 68, 68, 0.2) !important;
            border-color: var(--error) !important;
            color: #f87171;
        }

        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: center;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 16px 40px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(56, 189, 248, 0.5);
        }

        #motivation-screen, #result-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .mami-alert {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 25px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .easter-egg {
            position: absolute;
            bottom: 12px;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.05);
            pointer-events: none;
        }
    </style>
</head>

<div id="quiz-container">

    <div id="motivation-screen">

    let current = 0;
    let score = 0;

    function renderQuestion() {
        const q = questions[current];
        document.getElementById("game-ui").style.display = "block";
        document.getElementById("motivation-screen").style.display = "none";
        document.getElementById("counter").innerText = `${current + 1} / 195`;
        document.getElementById("progress-fill").style.width = `${((current + 1) / 195) * 100}%`;
        document.getElementById("question-text").innerText = q.q;
        
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        q.o.forEach((opt, index) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = `${String.fromCharCode(65 + index)}) ${opt}`;
            div.onclick = () => selectOption(index, div);
            container.appendChild(div);
        });
    }

    function selectOption(idx, el) {
        const correct = questions[current].c;
        const options = document.querySelectorAll(".option");
        options.forEach(o => o.style.pointerEvents = "none");

        if(idx === correct) {
            el.classList.add("correct");
            score++;
        } else {
            el.classList.add("wrong");
            options[correct].classList.add("correct");
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextStep() {
        current++;
        if (current < questions.length) {
            if (current % 25 === 0) {
                showMotivation();
            } else {
                renderQuestion();
            }
        } else {
            showResults();
        }
    }

    function showMotivation() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("motivation-screen").style.display = "block";
    }

    function resumeQuiz() {
        renderQuestion();
    }

    function showResults() {
        document.getElementById("game-ui").style.display = "none";
        const screen = document.getElementById("result-screen");
        screen.style.display = "block";
        document.getElementById("correct-count").innerText = score;
        
        let msg = "";
        if(score > 180) msg = "Mami sen nesin ya kardeşim şaka mı amk bunu zaten görmezsin";
        else if(score > 150) msg = "Mami helal olsun bilader.";
        else if(score > 100) msg = "Mami fena değil kardeşim, geçersin.";
        else msg = "Mami senin kafanı sikim.";
        document.getElementById("performance-msg").innerText = msg;
    }

    renderQuestion();
</script>
