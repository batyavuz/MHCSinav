<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biyokimya Pro | Mami Edition</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --secondary: #94a3b8;
            --accent: #f472b6;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        #quiz-container {
            background: var(--card-bg);
            max-width: 650px;
            width: 100%;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .title {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .counter-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 99px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .progress-container {
            height: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #fff;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .option.correct {
            background: rgba(34, 197, 94, 0.15) !important;
            border-color: var(--success) !important;
            color: #4ade80;
        }

        .option.wrong {
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: var(--error) !important;
            color: #f87171;
        }

        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        #motivation-screen, #result-screen {
            display: none;
            text-align: center;
            padding: 40px 10px;
        }

        .mami-alert {
            font-size: 2rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .easter-egg {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.65rem;
            color: rgba(255,255,255,0.1);
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="game-ui">
        <div class="header">
            <div class="title">BIYOKIMYA<span style="color:var(--accent)">PRO</span></div>
            <div class="counter-badge" id="counter">1 / 195</div>
        </div>
        <div class="progress-container">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div id="question-text" class="question-text">Yükleniyor...</div>
        <div id="options-container" class="options-grid"></div>
        <div class="footer">
            <button id="next-btn" onclick="nextStep()" style="display:none;">DEVAM ET →</button>
        </div>
    </div>

    <div id="motivation-screen">
        <div class="mami-alert">HADİ MAMİ! 🔥</div>
        <p style="font-size:1.2rem; color: var(--secondary); margin-bottom: 30px;">Yapabilirsin kardeşim, ben sana güveniyorum.<br>Kaldığın yerden parçalamaya devam!</p>
        <button onclick="resumeQuiz()">TAMAMDIR, DEVAM!</button>
    </div>

    <div id="result-screen">

        <button onclick="location.reload()">BAŞTAN BAŞLA</button>
    </div>
    
    <div class="easter-egg">ATP-MAMI-FORCE-v3.0</div>
</div>

    let current = 0;
    let score = 0;

    function renderQuestion() {
        const q = questions[current];
        document.getElementById("game-ui").style.display = "block";
        document.getElementById("motivation-screen").style.display = "none";
        document.getElementById("counter").innerText = `${current + 1} / 195`;
        document.getElementById("progress-fill").style.width = `${((current + 1) / 195) * 100}%`;
        document.getElementById("question-text").innerText = q.q;
        
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        document.getElementById("next-btn").style.display = "none";

        q.o.forEach((opt, index) => {
            const div = document.createElement("div");
            div.className = "option";
            div.innerText = `${String.fromCharCode(65 + index)}) ${opt}`;
            div.onclick = () => selectOption(index, div);
            container.appendChild(div);
        });
    }

    function selectOption(idx, el) {
        const correct = questions[current].c;
        const options = document.querySelectorAll(".option");
        options.forEach(o => o.style.pointerEvents = "none");

        if(idx === correct) {
            el.classList.add("correct");
            score++;
        } else {
            el.classList.add("wrong");
            options[correct].classList.add("correct");
        }
        document.getElementById("next-btn").style.display = "block";
    }

    function nextStep() {
        current++;
        if (current < questions.length) {
            if (current % 25 === 0) {
                showMotivation();
            } else {
                renderQuestion();
            }
        } else {
            showResults();
        }
    }

    function showMotivation() {
        document.getElementById("game-ui").style.display = "none";
        document.getElementById("motivation-screen").style.display = "block";
    }

    function resumeQuiz() {
        renderQuestion();
    }

    function showResults() {
        document.getElementById("game-ui").style.display = "none";
        const screen = document.getElementById("result-screen");
        screen.style.display = "block";
        document.getElementById("correct-count").innerText = score;
        
        let msg = "";
        if(score > 180) msg = "Mami sen nesin be kardeşim";
        else if(score > 150) msg = "Mami helal olsun, garanti gibi.";
        else if(score > 100) msg = "Mami fena değil kardeşim, geçersin.";
        else msg = "Mami biraz daha asılmamız lazım.";
        document.getElementById("performance-msg").innerText = msg;
    }

    renderQuestion();
</script>
